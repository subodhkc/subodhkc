name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=${{ github.event.inputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build ${{ github.event.inputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "Deployed to: $url"

      - name: Output Deployment URL
        run: echo "Deployment URL - ${{ steps.deploy.outputs.url }}"

      - name: Ping IndexNow after production deploy
        if: github.event.inputs.environment == 'production'
        run: |
          sleep 30
          # Fetch sitemap and extract all URLs dynamically
          SITEMAP=$(curl -s "https://subodhkc.com/sitemap.xml")
          if [ -z "$SITEMAP" ]; then
            echo "::warning::Could not fetch sitemap, using fallback URL list"
            URLS='["https://subodhkc.com","https://subodhkc.com/blog","https://subodhkc.com/feed.xml"]'
          else
            URLS=$(echo "$SITEMAP" | grep -oP '(?<=<loc>)[^<]+' | sort -u | python3 -c "
          import sys, json
          urls = [line.strip() for line in sys.stdin if line.strip()]
          print(json.dumps(urls))
          ")
            echo "Found $(echo "$URLS" | python3 -c 'import sys,json; print(len(json.load(sys.stdin)))') URLs in sitemap"
          fi

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\": \"subodhkc.com\", \"key\": \"subodhkcindexnowkey2026\", \"keyLocation\": \"https://subodhkc.com/subodhkcindexnowkey2026.txt\", \"urlList\": $URLS}")
          echo "IndexNow response: $RESPONSE"

      - name: Submit sitemap to Google
        if: github.event.inputs.environment == 'production'
        run: |
          curl -s -o /dev/null -w "Google sitemap ping: %{http_code}\n" \
            "https://www.google.com/ping?sitemap=https://subodhkc.com/sitemap.xml"
