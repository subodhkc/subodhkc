name: Weekly Newsletter Broadcast

on:
  schedule:
    - cron: '0 10 * * 1'  # Every Monday at 10:00 UTC (5:00 AM CST)
  workflow_dispatch:

jobs:
  broadcast:
    runs-on: ubuntu-latest
    env:
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send weekly newsletter
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::warning::RESEND_API_KEY not set — skipping newsletter broadcast"
            exit 0
          fi

          node scripts/send-newsletter.mjs

      - name: Notify on completion
        if: always()
        run: |
          echo "Newsletter broadcast completed at $(date)"
