name: Dev.to Publish Next Draft

on:
  schedule:
    # Run daily at 11:00 AM UTC (6:00 AM EST)
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-next:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish next Dev.to draft
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: node scripts/cross-post-devto.mjs --publish-next

      - name: Commit updated tracker
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/blog/devto-posted.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: published next Dev.to draft"
            git push
          fi
