name: CI — Build, Verify & Ping IndexNow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Verify sitemap exists
        run: |
          if [ -f "public/sitemap.xml" ]; then
            echo "Static sitemap.xml found"
          else
            echo "Sitemap is dynamically generated by Next.js (app/sitemap.ts) — OK"
          fi

      - name: Verify robots.txt config
        run: |
          if [ -f "app/robots.ts" ]; then
            echo "robots.ts found — dynamic robots.txt configured"
          else
            echo "::warning::app/robots.ts not found"
          fi

      - name: Verify .well-known files
        run: |
          for f in public/.well-known/wikidata-entity.json public/.well-known/ai-plugin.json; do
            if [ -f "$f" ]; then
              echo "Found: $f"
            else
              echo "::error::Missing: $f"
              exit 1
            fi
          done

      - name: Verify LLM files
        run: |
          for f in public/llms.txt public/llms-full.txt public/ai.txt; do
            if [ -f "$f" ]; then
              echo "Found: $f"
            else
              echo "::error::Missing: $f"
              exit 1
            fi
          done

      - name: Verify IndexNow key file
        run: |
          if [ -f "public/subodhkcindexnowkey2026.txt" ]; then
            KEY=$(cat public/subodhkcindexnowkey2026.txt)
            echo "IndexNow key file found: $KEY"
          else
            echo "::error::Missing IndexNow key file"
            exit 1
          fi

  ping-indexnow:
    needs: build-and-verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deployment
        run: sleep 60

      - name: Fetch sitemap and ping IndexNow with all URLs
        run: |
          # Fetch the live sitemap and extract all URLs
          SITEMAP=$(curl -s "https://subodhkc.com/sitemap.xml")
          if [ -z "$SITEMAP" ]; then
            echo "::warning::Could not fetch sitemap, using fallback URL list"
            URLS='["https://subodhkc.com","https://subodhkc.com/blog","https://subodhkc.com/feed.xml"]'
          else
            # Extract URLs from sitemap XML
            URLS=$(echo "$SITEMAP" | grep -oP '(?<=<loc>)[^<]+' | sort -u | python3 -c "
          import sys, json
          urls = [line.strip() for line in sys.stdin if line.strip()]
          print(json.dumps(urls))
          ")
            echo "Found $(echo "$URLS" | python3 -c 'import sys,json; print(len(json.load(sys.stdin)))') URLs in sitemap"
          fi

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\": \"subodhkc.com\", \"key\": \"subodhkcindexnowkey2026\", \"keyLocation\": \"https://subodhkc.com/subodhkcindexnowkey2026.txt\", \"urlList\": $URLS}")
          echo "IndexNow response: $RESPONSE"
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "202" ]; then
            echo "IndexNow ping successful"
          else
            echo "::warning::IndexNow returned $RESPONSE (non-fatal)"
          fi

      - name: Submit sitemap to Google
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.google.com/ping?sitemap=https://subodhkc.com/sitemap.xml")
          echo "Google sitemap ping response: $RESPONSE"
          echo "Note: Google may have deprecated this endpoint. Sitemap is referenced in robots.txt for organic discovery."

      - name: Verify live site is up
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://subodhkc.com")
          echo "Live site status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Site is live"
          else
            echo "::warning::Site returned $STATUS — may still be deploying"
          fi

      - name: Verify IndexNow key is accessible
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://subodhkc.com/subodhkcindexnowkey2026.txt")
          echo "IndexNow key file status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "IndexNow key file is accessible"
          else
            echo "::warning::IndexNow key file returned $STATUS"
          fi
