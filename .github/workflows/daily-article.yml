name: Daily AI Article Generation

on:
  schedule:
    # Every day at 10:00 UTC (05:00 CST)
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: 'Specific topic (leave empty for auto-pick)'
        required: false
        type: string
      source:
        description: 'Content source'
        required: false
        type: choice
        default: 'auto'
        options:
          - auto
          - frontofai
          - topic-queue

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FRONTOFAI_API_KEY: ${{ secrets.FRONTOFAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret not set"
            exit 1
          fi

          TOPIC="${{ github.event.inputs.topic }}"
          SOURCE="${{ github.event.inputs.source || 'auto' }}"

          if [ -n "$TOPIC" ]; then
            node scripts/generate-article.mjs --topic="$TOPIC"
          elif [ "$SOURCE" = "frontofai" ] || ([ "$SOURCE" = "auto" ] && [ -n "$FRONTOFAI_API_KEY" ]); then
            echo "Using FrontOfAI data source"
            node scripts/generate-article.mjs --frontofai
          else
            echo "Using topic queue (no FrontOfAI key or explicitly requested)"
            node scripts/generate-article.mjs
          fi

      - name: Generate social content for new article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          LATEST=$(ls -t data/blog/posts/*.json | head -1)
          SLUG=$(basename "$LATEST" .json)
          echo "Generating social content for: $SLUG"
          node scripts/generate-social.mjs --slug="$SLUG" --force

      - name: Commit and push to main (auto-merge)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain data/blog/posts/ data/social/)" ]; then
            git add data/blog/posts/ data/social/
            git commit -m "feat: daily AI article + social content [skip ci]"
            git push
            echo "Article auto-merged to main"
          else
            echo "No changes — article generation may have failed"
            exit 1
          fi
