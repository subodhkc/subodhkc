name: Daily AI Article Generation

on:
  schedule:
    # Every day at 14:00 UTC (09:00 CST) — optimal LinkedIn posting time
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: 'Specific topic (leave empty for auto-pick)'
        required: false
        type: string
      source:
        description: 'Content source (auto runs both FrontOfAI + topic queue)'
        required: false
        type: choice
        default: 'auto'
        options:
          - auto
          - frontofai
          - topic-queue

jobs:
  generate-frontofai-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'schedule' || github.event.inputs.source == 'auto' || github.event.inputs.source == 'frontofai'
    outputs:
      ran: ${{ steps.check.outputs.ran }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate article from FrontOfAI
        id: check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FRONTOFAI_API_KEY: ${{ secrets.FRONTOFAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret not set"
            exit 1
          fi

          if [ -z "$FRONTOFAI_API_KEY" ]; then
            echo "FRONTOFAI_API_KEY not set — skipping FrontOfAI article"
            echo "ran=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Generating article from FrontOfAI..."
          node scripts/generate-article.mjs --frontofai
          echo "ran=true" >> $GITHUB_OUTPUT

      - name: Generate social content for FrontOfAI article
        if: success() && steps.check.outputs.ran == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$(ls data/blog/posts/*.json 2>/dev/null)" ]; then
            LATEST=$(ls -t data/blog/posts/*.json | head -1)
            SLUG=$(basename "$LATEST" .json)
            echo "Generating social content for: $SLUG"
            node scripts/generate-social.mjs --slug="$SLUG" --force
          fi

      - name: Upload FrontOfAI article artifact
        if: always() && steps.check.outputs.ran == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontofai-article
          path: |
            data/blog/posts/
            data/social/
          retention-days: 1

  generate-topic-queue-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: generate-frontofai-article
    if: ${{ !cancelled() && (github.event_name == 'schedule' || github.event.inputs.source == 'auto' || github.event.inputs.source == 'topic-queue') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download FrontOfAI article artifact
        if: needs.generate-frontofai-article.result == 'success' && needs.generate-frontofai-article.outputs.ran == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontofai-article
          path: data/

      - name: Generate article from topic queue
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret not set"
            exit 1
          fi

          TOPIC="${{ github.event.inputs.topic }}"
          if [ -n "$TOPIC" ]; then
            node scripts/generate-article.mjs --topic="$TOPIC"
          else
            node scripts/generate-article.mjs
          fi

      - name: Generate social content for topic queue article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          LATEST=$(ls -t data/blog/posts/*.json | head -1)
          SLUG=$(basename "$LATEST" .json)
          echo "Generating social content for: $SLUG"
          node scripts/generate-social.mjs --slug="$SLUG" --force

      - name: Upload topic-queue article artifact
        uses: actions/upload-artifact@v4
        with:
          name: topic-queue-article
          path: |
            data/blog/posts/
            data/social/
          retention-days: 1

  commit-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [generate-frontofai-article, generate-topic-queue-article]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download FrontOfAI article artifact
        if: needs.generate-frontofai-article.result == 'success' && needs.generate-frontofai-article.outputs.ran == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontofai-article
          path: data/

      - name: Download topic-queue article artifact
        if: needs.generate-topic-queue-article.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: topic-queue-article
          path: data/

      - name: Commit and push articles to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain data/blog/posts/ data/social/)" ]; then
            git add data/blog/posts/ data/social/
            git commit -m "feat: daily AI articles (FrontOfAI + topic queue) + social content"
            git push
            echo "Articles auto-merged to main"
          else
            echo "No changes — article generation may have failed"
            exit 1
          fi

  post-to-linkedin:
    runs-on: ubuntu-latest
    needs: [commit-and-push, generate-frontofai-article, generate-topic-queue-article]
    if: needs.commit-and-push.result == 'success'
    env:
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_MEMBER_ID: ${{ secrets.LINKEDIN_MEMBER_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download FrontOfAI article artifact
        if: needs.generate-frontofai-article.result == 'success' && needs.generate-frontofai-article.outputs.ran == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontofai-article
          path: data/

      - name: Download topic-queue article artifact
        if: needs.generate-topic-queue-article.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: topic-queue-article
          path: data/

      - name: Post latest article to LinkedIn (one per day)
        run: |
          if [ -z "$LINKEDIN_ACCESS_TOKEN" ] || [ -z "$LINKEDIN_MEMBER_ID" ]; then
            echo "::warning::LINKEDIN_ACCESS_TOKEN or LINKEDIN_MEMBER_ID not set — skipping LinkedIn post"
            exit 0
          fi

          if [ -n "$(ls data/blog/posts/*.json 2>/dev/null)" ]; then
            LATEST=$(ls -t data/blog/posts/*.json | head -1)
            SLUG=$(basename "$LATEST" .json)
            echo "Posting to LinkedIn: $SLUG"
            node scripts/post-linkedin.mjs --slug="$SLUG" || echo "::warning::LinkedIn post failed for $SLUG"
          else
            echo "::warning::No blog posts found — skipping LinkedIn post"
          fi
