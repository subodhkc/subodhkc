name: Daily AI Article Generation

on:
  schedule:
    # Every day at 10:00 UTC (05:00 CST)
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: 'Specific topic (leave empty for auto-pick)'
        required: false
        type: string

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret not set — cannot generate article"
            exit 1
          fi

          TOPIC="${{ github.event.inputs.topic }}"
          if [ -n "$TOPIC" ]; then
            node scripts/generate-article.mjs --topic="$TOPIC"
          else
            node scripts/generate-article.mjs
          fi

      - name: Generate social content for new article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Find the most recently created post file
          LATEST=$(ls -t data/blog/posts/*.json | head -1)
          SLUG=$(basename "$LATEST" .json)
          echo "Generating social content for: $SLUG"
          node scripts/generate-social.mjs --slug="$SLUG" --force

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: daily AI article + social content [skip ci]"
          title: "Daily Article: $(date -u '+%Y-%m-%d')"
          body: |
            ## Auto-Generated Daily Article

            This PR contains a new AI-generated blog post and social media content.

            ### Review Checklist
            - [ ] Article title is compelling and SEO-optimized
            - [ ] Content is accurate and adds value
            - [ ] No hallucinated facts or sources
            - [ ] Keywords are relevant
            - [ ] Meta description is under 160 chars
            - [ ] Social content in data/social/ is appropriate
            - [ ] No duplicate of existing content

            ### Auto-actions on merge
            - IndexNow ping (Bing, Yandex, Seznam)
            - Google Indexing API submission
            - Sitemap update
            - RSS feed update

            Generated on $(date -u '+%Y-%m-%d %H:%M UTC')
          branch: daily-article
          branch-suffix: short-commit-hash
          labels: |
            auto-generated
            content
