name: Daily AI Article Generation

on:
  schedule:
    # Every day at 14:00 UTC (09:00 CST) — optimal LinkedIn posting time
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: 'Specific topic (leave empty for auto-pick)'
        required: false
        type: string
      source:
        description: 'Content source (auto runs both FrontOfAI + topic queue)'
        required: false
        type: choice
        default: 'auto'
        options:
          - auto
          - frontofai
          - topic-queue

jobs:
  generate-frontofai-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'schedule' || github.event.inputs.source == 'auto' || github.event.inputs.source == 'frontofai'
    outputs:
      ran: ${{ steps.check.outputs.ran }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate article from FrontOfAI
        id: check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FRONTOFAI_API_KEY: ${{ secrets.FRONTOFAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret not set"
            exit 1
          fi

          if [ -z "$FRONTOFAI_API_KEY" ]; then
            echo "FRONTOFAI_API_KEY not set — skipping FrontOfAI article"
            echo "ran=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Generating article from FrontOfAI..."
          node scripts/generate-article.mjs --frontofai
          echo "ran=true" >> $GITHUB_OUTPUT

      - name: Generate social content for FrontOfAI article
        if: success() && steps.check.outputs.ran == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$(ls data/blog/posts/*.json 2>/dev/null)" ]; then
            LATEST=$(ls -t data/blog/posts/*.json | head -1)
            SLUG=$(basename "$LATEST" .json)
            echo "Generating social content for: $SLUG"
            node scripts/generate-social.mjs --slug="$SLUG" --force
          fi

      - name: Upload FrontOfAI article artifact
        if: always() && steps.check.outputs.ran == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontofai-article
          path: |
            data/blog/posts/
            data/social/
            public/blog-images/
          retention-days: 1

  generate-topic-queue-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: generate-frontofai-article
    if: ${{ !cancelled() && (github.event_name == 'schedule' || github.event.inputs.source == 'auto' || github.event.inputs.source == 'topic-queue') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download FrontOfAI article artifact
        if: needs.generate-frontofai-article.result == 'success' && needs.generate-frontofai-article.outputs.ran == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontofai-article
          path: data/

      - name: Generate article from topic queue
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret not set"
            exit 1
          fi

          TOPIC="${{ github.event.inputs.topic }}"
          if [ -n "$TOPIC" ]; then
            node scripts/generate-article.mjs --topic="$TOPIC"
          else
            node scripts/generate-article.mjs
          fi

      - name: Generate social content for topic queue article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          LATEST=$(ls -t data/blog/posts/*.json | head -1)
          SLUG=$(basename "$LATEST" .json)
          echo "Generating social content for: $SLUG"
          node scripts/generate-social.mjs --slug="$SLUG" --force

      - name: Upload topic-queue article artifact
        uses: actions/upload-artifact@v4
        with:
          name: topic-queue-article
          path: |
            data/blog/posts/
            data/social/
            public/blog-images/
          retention-days: 1

  commit-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [generate-frontofai-article, generate-topic-queue-article]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download FrontOfAI article artifact
        if: needs.generate-frontofai-article.result == 'success' && needs.generate-frontofai-article.outputs.ran == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontofai-article
          path: .

      - name: Download topic-queue article artifact
        if: needs.generate-topic-queue-article.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: topic-queue-article
          path: .

      - name: Commit and push articles to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain data/blog/posts/ data/social/ public/blog-images/)" ]; then
            git add data/blog/posts/ data/social/ public/blog-images/
            git commit -m "feat: daily AI articles (FrontOfAI + topic queue) + social content + hero images"
            git push
            echo "Articles auto-merged to main"
          else
            echo "No changes — article generation may have failed"
            exit 1
          fi

  post-to-linkedin:
    runs-on: ubuntu-latest
    needs: [commit-and-push, generate-frontofai-article, generate-topic-queue-article]
    if: needs.commit-and-push.result == 'success'
    env:
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_MEMBER_ID: ${{ secrets.LINKEDIN_MEMBER_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download FrontOfAI article artifact
        if: needs.generate-frontofai-article.result == 'success' && needs.generate-frontofai-article.outputs.ran == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontofai-article
          path: .

      - name: Download topic-queue article artifact
        if: needs.generate-topic-queue-article.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: topic-queue-article
          path: .

      - name: Post latest article to LinkedIn (one per day)
        run: |
          if [ -z "$LINKEDIN_ACCESS_TOKEN" ] || [ -z "$LINKEDIN_MEMBER_ID" ]; then
            echo "::warning::LINKEDIN_ACCESS_TOKEN or LINKEDIN_MEMBER_ID not set — skipping LinkedIn post"
            exit 0
          fi

          if [ -n "$(ls data/blog/posts/*.json 2>/dev/null)" ]; then
            LATEST=$(ls -t data/blog/posts/*.json | head -1)
            SLUG=$(basename "$LATEST" .json)
            echo "Posting to LinkedIn: $SLUG"
            node scripts/post-linkedin.mjs --slug="$SLUG" || echo "::warning::LinkedIn post failed for $SLUG"
          else
            echo "::warning::No blog posts found — skipping LinkedIn post"
          fi

      - name: Commit posted tracker
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "data/social/posted.json" ]; then
            git add data/social/posted.json
            git commit -m "chore: update LinkedIn posted tracker" || echo "No changes to tracker"
            git push || echo "Push failed — tracker will be regenerated next run"
          fi

      - name: Cross-post to Dev.to
        if: success()
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          if [ -z "$DEVTO_API_KEY" ]; then
            echo "::notice::DEVTO_API_KEY not set — skipping Dev.to cross-post"
            exit 0
          fi

          if [ -n "$(ls data/blog/posts/*.json 2>/dev/null)" ]; then
            LATEST=$(ls -t data/blog/posts/*.json | head -1)
            SLUG=$(basename "$LATEST" .json)
            echo "Cross-posting to Dev.to: $SLUG"
            node scripts/cross-post-devto.mjs --slug="$SLUG" || echo "::warning::Dev.to cross-post failed for $SLUG"
          else
            echo "::warning::No blog posts found — skipping Dev.to cross-post"
          fi

      - name: Notify Google Indexing API + IndexNow (ensure original is indexed first)
        if: success()
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$(ls data/blog/posts/*.json 2>/dev/null)" ]; then
            LATEST=$(ls -t data/blog/posts/*.json | head -1)
            SLUG=$(basename "$LATEST" .json)
            ARTICLE_URL="https://subodhkc.com/blog/${SLUG}"

            echo "Notifying search engines about new article: $ARTICLE_URL"

            # 1. Ping IndexNow (Bing, Yandex, Seznam)
            INDEXNOW_RESP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json" \
              -d "{\"host\": \"subodhkc.com\", \"key\": \"subodhkcindexnowkey2026\", \"keyLocation\": \"https://subodhkc.com/subodhkcindexnowkey2026.txt\", \"urlList\": [\"$ARTICLE_URL\"]}")
            echo "IndexNow response: $INDEXNOW_RESP"

            # 2. Submit to Google Indexing API (if credentials available)
            if [ -z "$GCP_SERVICE_ACCOUNT_JSON" ]; then
              echo "::notice::GCP_SERVICE_ACCOUNT_JSON not set — skipping Google Indexing API"
              exit 0
            fi

            pip install cryptography -q

            ACCESS_TOKEN=$(python3 -c "
          import json, urllib.request, urllib.parse, base64, time
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import padding

          key = json.loads('''$GCP_SERVICE_ACCOUNT_JSON''')
          header = {'alg': 'RS256', 'typ': 'JWT'}
          payload = {
              'iss': key['client_email'],
              'scope': 'https://www.googleapis.com/auth/indexing',
              'aud': 'https://oauth2.googleapis.com/token',
              'exp': int(time.time()) + 3600,
              'iat': int(time.time())
          }
          def b64encode(data):
              return base64.urlsafe_b64encode(data).rstrip(b'=').decode()
          header_b64 = b64encode(json.dumps(header, separators=(',', ':')).encode())
          payload_b64 = b64encode(json.dumps(payload, separators=(',', ':')).encode())
          private_key = serialization.load_pem_private_key(key['private_key'].encode(), password=None)
          signature = private_key.sign(f'{header_b64}.{payload_b64}'.encode(), padding.PKCS1v15(), hashes.SHA256())
          jwt = f'{header_b64}.{payload_b64}.{b64encode(signature)}'
          data = urllib.parse.urlencode({'grant_type': 'urn:ietf:params:oauth:grant-type:jwt-bearer', 'assertion': jwt}).encode()
          req = urllib.request.Request('https://oauth2.googleapis.com/token', data=data)
          resp = urllib.request.urlopen(req)
          print(json.loads(resp.read())['access_token'])
            ")

            if [ -n "$ACCESS_TOKEN" ]; then
              GGL_RESP=$(curl -s -w "\n%{http_code}" \
                -X POST "https://indexing.googleapis.com/v3/urlNotifications:publish" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                -d "{\"url\": \"$ARTICLE_URL\", \"type\": \"URL_UPDATED\"}")
              GGL_CODE=$(echo "$GGL_RESP" | tail -1)
              echo "Google Indexing API response: $GGL_CODE"
              if [ "$GGL_CODE" != "200" ]; then
                echo "::error::Google Indexing API failed with HTTP $GGL_CODE for $ARTICLE_URL"
                if [ "$GGL_CODE" = "403" ]; then
                  echo "::error::403 Permission denied. Add service account as Owner in Google Search Console > Settings > Users and permissions."
                fi
                exit 1
              fi
            else
              echo "::error::Could not get Google access token"
              exit 1
            fi
          else
            echo "::warning::No blog posts found — skipping indexing notification"
          fi

      - name: Send Medium import reminder
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::notice::RESEND_API_KEY not set — skipping Medium reminder"
            exit 0
          fi

          if [ -n "$(ls data/blog/posts/*.json 2>/dev/null)" ]; then
            LATEST=$(ls -t data/blog/posts/*.json | head -1)
            SLUG=$(basename "$LATEST" .json)
            echo "Sending Medium import reminder for: $SLUG"
            node scripts/cross-post-medium.mjs --slug="$SLUG" || echo "::warning::Medium reminder failed for $SLUG"
          fi

      - name: Generate outreach plan
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -n "$(ls data/blog/posts/*.json 2>/dev/null)" ]; then
            LATEST=$(ls -t data/blog/posts/*.json | head -1)
            SLUG=$(basename "$LATEST" .json)
            echo "Generating outreach plan for: $SLUG"
            node scripts/outreach-generator.mjs --slug="$SLUG" || echo "::warning::Outreach generation failed for $SLUG"
          fi

      - name: Commit cross-post trackers and outreach plans
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/blog/devto-posted.json data/blog/medium-posted.json data/outreach/ 2>/dev/null || true
          git commit -m "chore: update cross-post trackers and outreach plans" || echo "No changes to commit"
          git push || echo "Push failed — will retry next run"
